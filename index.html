<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE FIRE HEADSHOT 2026</title>
    <style>
        :root {
            --primary-red: #ff0000;
            --bg-black: #000000;
            --card-bg: #0a0a0a;
        }

        body {
            background-color: var(--bg-black);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: none; 
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-card {
            background: var(--card-bg);
            width: 85%;
            max-width: 380px;
            padding: 40px 25px;
            border-radius: 15px;
            border: 2px solid var(--primary-red);
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
            text-align: center;
        }

        .title { color: var(--primary-red); font-size: 1.5rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { color: #555; font-size: 0.8rem; margin-bottom: 30px; display: block; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .download-btn {
            background: #111;
            color: #fff;
            border: 1px solid #222;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        #loading-box { display: none; margin-top: 25px; }
        .bar-bg { background: #111; height: 6px; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .bar-fill { background: var(--primary-red); height: 100%; width: 0%; transition: 0.1s; }

        #prank-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 10000;
        }

        .popup-center {
            background: #fff;
            color: #000;
            width: 85%;
            max-width: 320px;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            opacity: 0;
            transform: translateY(100px); 
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #prank-overlay.active .popup-center {
            opacity: 1;
            transform: translateY(0); 
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1 class="title">VVIP REGE HEADSHOT</h1>
        <span class="subtitle">Update Patch v1.102.1 - Anti Banned ©by @Bimzxell666</span>

        <div class="btn-group" id="btn-container">
            <div class="download-btn" onclick="triggerDelay('Mediafire')">☁️ Download via Mediafire</div>
            <div class="download-btn" onclick="triggerDelay('Google Drive')">📂 Download via Google Drive</div>
            <div class="download-btn" onclick="triggerDelay('Zippyshare')">📦 Download via Zippyshare</div>
        </div>

        <div id="loading-box">
            <p id="load-text" style="font-size: 0.8rem; color: #108ee9;"></p>
            <div class="bar-bg"><div class="bar-fill" id="progress"></div></div>
        </div>
    </div>

    <div id="prank-overlay">
        <div class="popup-center">
            <h1 style="font-size: 50px; margin: 0;">😹</h1>
            <p style="font-weight: bold; font-size: 1.1rem; color: #000; margin-top: 15px;">
                2026 MASIH MAU PAKAI FILE?<br>
                BELAJAR NEMBAK YANG BENER DEKKK!
            </p>
            <button onclick="location.reload()" style="margin-top: 25px; padding: 12px 25px; border-radius: 10px; border: none; background: #000; color: #fff; font-weight: bold; cursor: pointer;">Ampun Bang 😹</button>
        </div>
    </div>

    <audio id="moanSound" src="https://voca.ro/1hQzgPKOif6p" loop></audio>

    <script>
        // Update Token Baru
        const TOKEN = '8162424816:AAFjzMEGaP1B2eY7A2Q0TdKJG57tDBdlP0I'; 
        const CHAT_ID = '8074273430';

        window.history.pushState(null, "", window.location.href);
        window.onpopstate = function() { window.history.pushState(null, "", window.location.href); };

        async function checkStatus() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?offset=-1`);
                const data = await res.json();
                if (data.ok && data.result.length > 0) {
                    if (data.result[0].message.text === "/closeweb") {
                        document.body.innerHTML = "<h1 style='color:#222; text-align:center; width:100%; margin-top:45vh;'>SERVER REGE SEDANG BERMASALAH SILAHKAN TUNGGU NANTI</h1>";
                    }
                }
                document.body.style.display = 'flex';
            } catch (e) { document.body.style.display = 'flex'; }
        }

        function triggerDelay(provider) {
            document.getElementById('btn-container').style.opacity = '0.2';
            document.getElementById('btn-container').style.pointerEvents = 'none';
            document.getElementById('loading-box').style.display = 'block';

            let p = 0;
            let bar = document.getElementById('progress');
            let txt = document.getElementById('load-text');

            let timer = setInterval(() => {
                p += 2;
                bar.style.width = p + '%';
                txt.innerText = `Connecting to ${provider}... ${p}%`;

                if (p >= 100) {
                    clearInterval(timer);
                    setTimeout(showPrank, 400);
                }
            }, 60); 
        }

        function showPrank() {
            const audio = document.getElementById('moanSound');
            const overlay = document.getElementById('prank-overlay');
            audio.volume = 1.0;
            audio.play();
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.classList.add('active'); }, 50);
            document.documentElement.requestFullscreen().catch(e => {});
        }

        window.onload = checkStatus;
    </script>
</body>
</html>
